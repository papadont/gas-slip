<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>GAS-SLIP</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #fffdf8;
    --panel-strong: #fff7e8;
    --line: #d7cab8;
    --text: #2d2419;
    --muted: #6d6357;
    --accent: #b85c38;
    --result: #234f3a;
    --result-soft: #e3f0e8;
    --shadow: 0 18px 44px rgba(73, 49, 28, 0.08);
    --tile-1-bg: #79c89c;
    --tile-1-line: #56af7d;
    --tile-2-bg: #7f9cf5;
    --tile-2-line: #5f7ee3;
    --tile-3-bg: #f29b7a;
    --tile-3-line: #e07c56;
  }

  * { box-sizing: border-box; }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    padding:
      max(10px, env(safe-area-inset-top))
      max(10px, env(safe-area-inset-right))
      max(28px, env(safe-area-inset-bottom))
      max(10px, env(safe-area-inset-left));
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  }

  .app {
    width: min(680px, 100%);
    margin: 0 auto;
  }

  .app-header {
    position: sticky;
    top: 0;
    z-index: 40;
    padding: 0 0 4px;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(8px);
  }

  .btn {
    border: none;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 12px 22px rgba(184, 92, 56, 0.18);
  }

  .btn-secondary {
    padding: 5px 10px;
    background: rgba(255, 255, 255, 0.78);
    color: #6b5845;
    border: 1px solid #d7cab8;
    box-shadow: none;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: default;
    box-shadow: none;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }

  .settings {
    padding: 6px 8px 5px;
    border-color: #e6ddd0;
    background: rgba(255, 252, 246, 0.9);
    box-shadow: none;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: 0.55fr auto 0.55fr auto max-content 0.45fr 0.45fr;
    gap: 4px 6px;
    align-items: end;
  }

  .setting-item-display {
    display: grid;
    gap: 1px;
    align-items: end;
    justify-items: start;
    padding-right: 12px;
    padding-bottom: 4px;
    white-space: nowrap;
  }

  .setting-item-display strong {
    font-size: 8px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .setting-item-display span {
    font-size: 11px;
    font-weight: 800;
    color: #74563f;
  }

  .setting-operator {
    display: flex;
    align-items: end;
    justify-content: center;
    padding-bottom: 6px;
    font-size: 10px;
    font-weight: 900;
    color: #8c7862;
    white-space: nowrap;
  }

  .setting-item label {
    display: block;
    margin-bottom: 2px;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .setting-item input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 4px 6px;
    background: #fff;
    color: var(--text);
    font-size: 13px;
    line-height: 1.2;
    font-family: inherit;
    appearance: none;
    -webkit-appearance: none;
  }

  .setting-item input:focus,
  .reading-input input:focus {
    outline: 2px solid rgba(184, 92, 56, 0.22);
    border-color: var(--accent);
  }

  .main {
    display: grid;
    gap: 10px;
  }

  .total-card {
    padding: 12px;
    border-width: 2px;
    border-color: #d7cab8;
  }

  .settings-inline {
    margin-bottom: 2px;
  }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: -12px -12px 12px;
    padding: 7px 10px;
    background: #efeadf;
    border-bottom: 2px solid #d7cab8;
    border-radius: 18px 18px 0 0;
  }

  .app-header .card-head {
    margin: 0;
    border: 2px solid #d7cab8;
    border-radius: 18px;
  }

  .card-head-stats {
    display: flex;
    align-items: baseline;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    min-width: 0;
  }

  .card-head-stat {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .card-head-stat strong {
    font-size: 10px;
    font-weight: 700;
    color: #8c7862;
    white-space: nowrap;
  }

  .card-head-stat-primary strong {
    color: var(--text);
  }

  .card-head-stat span {
    font-size: 18px;
    font-weight: 900;
    color: #74563f;
    line-height: 1;
    white-space: nowrap;
  }

  .card-head-stat-primary span {
    color: var(--text);
  }

  .card-head-stat-cost span {
    font-size: 14px;
  }

  #head_total_amount {
    padding-right: 4px;
  }

  .layout {
    display: grid;
    gap: 10px;
  }

  .total-inner {
    padding: 0;
    display: grid;
    gap: 10px;
  }

  .tiles {
    display: grid;
    gap: 10px;
  }

  .tiles-actions {
    display: flex;
    justify-content: center;
    margin-top: 2px;
  }

  .input-tile {
    border: 2px solid var(--tile-line);
    border-radius: 18px;
    background: #fff;
    overflow: hidden;
  }

  .tile-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: var(--tile-bg);
    border-bottom: 1px solid var(--tile-line);
  }

  .tile-no {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.12);
  }

  .tile-head input {
    flex: 1;
    min-width: 0;
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 8px;
    padding: 5px 8px;
    background: rgba(255, 253, 248, 0.94);
    font-size: 16px;
    font-family: inherit;
    appearance: none;
    -webkit-appearance: none;
  }

  .tile-body {
    display: grid;
    gap: 10px;
    padding: 10px;
    background: var(--panel-strong);
  }

  .reading-field,
  .usage-field {
    padding: 12px;
    border-radius: 14px;
    border: 1px solid #ead7b6;
    background: rgba(255, 255, 255, 0.45);
  }

  .usage-field {
    background: color-mix(in srgb, var(--tile-bg) 18%, #ffffff 82%);
    border-color: color-mix(in srgb, var(--tile-line) 55%, #ffffff 45%);
    border-width: 2px;
  }

  .usage-field .field-title {
    color: var(--text);
  }

  .field-title {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    color: #665640;
    font-weight: 700;
  }

  .reading-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
    gap: 8px;
    align-items: center;
  }

  .reading-input {
    min-width: 0;
    display: grid;
    gap: 4px;
  }

  .reading-input-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .reading-input input {
    width: min(58%, 180px);
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px 10px;
    background: #fffefb;
    color: var(--text);
    font-size: clamp(18px, 5.4vw, 24px);
    font-weight: 700;
    font-family: inherit;
    text-align: right;
    line-height: 1;
    appearance: none;
    -webkit-appearance: none;
  }

  .reading-unit {
    font-size: 13px;
    font-weight: 700;
    color: #5c5348;
    line-height: 1;
    white-space: nowrap;
  }

  .reading-input label {
    font-size: 12px;
    font-weight: 700;
    color: #5c5348;
    line-height: 1;
    white-space: nowrap;
  }

  .reading-sub {
    width: min(58%, 180px);
    padding-right: 10px;
    font-size: 9px;
    color: #9a907f;
    line-height: 1.3;
    text-align: right;
  }

  .reading-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: stretch;
    font-size: 24px;
    font-weight: 900;
    color: var(--tile-line);
    line-height: 1;
    letter-spacing: -0.08em;
  }

  .usage-grid {
    display: grid;
    gap: 6px;
  }

  .usage-label {
    display: inline-block;
    min-width: 3.8em;
    margin-right: 6px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .usage-line-cost .usage-label {
    color: var(--tile-line);
  }

  .usage-line {
    font-size: 13px;
    line-height: 1.5;
    color: color-mix(in srgb, var(--tile-line) 70%, #244333 30%);
  }

  .usage-line-cost {
    font-size: 11px;
  }

  .usage-line-cost .usage-line-strong {
    color: var(--tile-line);
  }

  .usage-line-strong {
    font-size: 18px;
    font-weight: 900;
    line-height: 1;
    color: var(--text);
  }

  .formula-panel {
    display: grid;
    gap: 10px;
    padding: 14px;
    border-radius: 18px;
    border: 2px solid #d7cab8;
    background: linear-gradient(180deg, #fffdfa 0%, #fbf5ec 100%);
  }

  .formula-step {
    padding: 11px 12px;
    border: 2px solid #d7cab8;
    border-radius: 14px;
    background: #f7f1e7;
  }

  .formula-step strong {
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    color: var(--muted);
  }

  .formula-step div {
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }

  .formula-strong {
    font-size: 18px;
    font-weight: 900;
    color: #74563f;
    line-height: 1;
  }

  .inline-strong {
    font-weight: 900;
    color: #74563f;
  }

  .result-box {
    display: grid;
    gap: 8px;
    padding: 14px;
    border-radius: 16px;
    background: #f3ece1;
    border: 3px solid #d7cab8;
  }

  .result-main {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .result-main strong {
    font-size: 12px;
    color: #74563f;
  }

  .result-main-primary strong {
    color: var(--text);
  }

  .result-main span {
    font-size: clamp(24px, 8vw, 34px);
    font-weight: 900;
    color: #74563f;
    letter-spacing: 0.04em;
  }

  .result-main-primary span {
    color: var(--text);
  }

  .result-breakdown {
    display: grid;
    gap: 4px;
    font-size: 12px;
    color: #74563f;
  }

  .result-table {
    display: grid;
    gap: 4px;
  }

  .result-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    align-items: baseline;
  }

  .result-row-spacer {
    min-height: 8px;
  }

  .result-cell {
    line-height: 1.5;
  }

  .result-head .result-cell {
    font-size: 11px;
    font-weight: 700;
    color: #8c7862;
  }

  .result-head {
    padding-bottom: 3px;
    border-bottom: 1px solid #d7cab8;
  }

  .result-total .result-cell {
    font-weight: 700;
  }

  .result-row .result-cell:nth-child(3) {
    text-align: right;
  }

  .result-value {
    font-size: 15px;
    font-weight: 800;
    color: #74563f;
    line-height: 1.2;
  }

  @media (max-width: 640px) {
    body {
      padding:
        max(8px, env(safe-area-inset-top))
        max(8px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom))
        max(8px, env(safe-area-inset-left));
    }

    .app-header {
      top: env(safe-area-inset-top);
    }

    .settings-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px 4px;
    }

    .settings {
      padding: 6px;
    }

    .setting-item input {
      font-size: 16px;
      padding: 3px 5px;
    }

    .setting-operator,
    .setting-item-display {
      display: none;
    }

    .main {
      gap: 6px;
    }

    .total-card {
      padding: 8px;
    }

    .card-head {
      align-items: center;
      gap: 6px;
      margin: -8px -8px 8px;
      padding: 6px 7px;
    }

    .app-header .card-head {
      margin: 0;
      border-radius: 14px;
    }

    .card-head-stats {
      align-items: center;
      gap: 6px;
      justify-content: flex-start;
    }

    .card-head-stat {
      align-items: center;
      gap: 2px;
    }

    .card-head-stat strong {
      font-size: 8px;
    }

    .card-head-stat span {
      font-size: 14px;
    }

    .tile-no {
      font-size: 14px;
    }

    .tile-head input {
      padding: 3px 7px;
      font-size: 14px;
    }

    .tile-head {
      padding: 6px 8px;
      gap: 6px;
    }

    .tile-body {
      padding: 8px;
      gap: 8px;
    }

    .reading-field,
    .usage-field,
    .formula-panel,
    .result-box {
      padding: 8px;
      border-radius: 12px;
    }

    .reading-grid {
      grid-template-columns: minmax(0, 1fr) 28px minmax(0, 1fr);
      gap: 4px;
    }

    .reading-input input {
      width: 100%;
      max-width: none;
      padding: 6px 7px;
      font-size: clamp(14px, 4.2vw, 18px);
      border-radius: 10px;
    }

    .reading-sub {
      width: 100%;
      padding-right: 2px;
      font-size: 8px;
    }

    .reading-arrow {
      font-size: 16px;
    }

    .field-title,
    .reading-input label {
      margin-bottom: 6px;
      font-size: 10px;
    }

    .reading-unit {
      font-size: 11px;
    }

    .usage-grid {
      gap: 4px;
    }

    .usage-line {
      font-size: 10px;
      line-height: 1.35;
    }

    .usage-line-strong {
      font-size: 14px;
    }

    .formula-step div {
      font-size: 10px;
      line-height: 1.35;
    }

    .formula-strong {
      font-size: 14px;
    }

    .result-main span {
      font-size: clamp(18px, 6.4vw, 24px);
    }

    .result-main strong {
      font-size: 10px;
    }

    .result-breakdown,
    .result-head .result-cell {
      font-size: 10px;
    }

    .result-value {
      font-size: 11px;
    }

    .input-tile {
      border-radius: 14px;
    }

    .reading-field,
    .usage-field {
      border-radius: 10px;
    }

    .btn {
      padding: 6px 11px;
      font-size: 10px;
    }

    .btn-secondary {
      padding: 4px 8px;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="app-header">
      <div class="card-head panel">
          <button class="btn btn-secondary" type="button" id="reset-btn">クリア</button>
          <div class="card-head-stats">
            <div class="card-head-stat card-head-stat-primary">
              <strong>使用量</strong>
              <span id="head_total_usage">0.0kg</span>
            </div>
            <div class="card-head-stat card-head-stat-primary">
              <strong>売価</strong>
              <span id="head_total_amount">0円</span>
            </div>
            <div class="card-head-stat card-head-stat-cost">
              <strong>買価</strong>
              <span id="head_total_cost">0円</span>
            </div>
          </div>
      </div>
    </div>

    <main class="main">
      <article class="panel total-card">

        <div class="layout">
          <aside class="panel settings settings-inline">
            <div class="settings-grid">
              <div class="setting-item">
                <label for="cfg_base_price">仕入単価</label>
                <input type="number" id="cfg_base_price" value="143.4" step="0.1" inputmode="decimal" enterkeyhint="next">
              </div>
              <div class="setting-operator">+</div>
              <div class="setting-item">
                <label for="cfg_tax_amount">マージン</label>
                <input type="number" id="cfg_tax_amount" value="11" step="0.1" inputmode="decimal" enterkeyhint="next">
              </div>
              <div class="setting-operator">=</div>
              <div class="setting-item-display">
                <strong>売単価</strong>
                <span id="cfg_adjusted_price_display">154.4円</span>
              </div>
              <div class="setting-item">
                <label for="cfg_conversion">換算係数</label>
                <input type="number" id="cfg_conversion" value="0.48" step="0.01" inputmode="decimal" enterkeyhint="next">
              </div>
              <div class="setting-item">
                <label for="cfg_tax">消費税率</label>
                <input type="number" id="cfg_tax" value="1.1" step="0.01" inputmode="decimal" enterkeyhint="done">
              </div>
            </div>
          </aside>

          <section class="tiles">
            <div id="tiles"></div>
            <div class="tiles-actions">
              <button class="btn btn-primary" type="button" id="add-tile-btn">＋ 入力タイルを追加</button>
            </div>
          </section>

          <div class="total-inner">
            <section class="formula-panel">
              <div class="formula-step">
                <strong>合計使用量</strong>
                <div id="total_usage_m3">0.0 m3</div>
              </div>

              <div class="formula-step">
                <strong>合計売価</strong>
                <div id="total_formula">0.0 ÷ 0.48 × 154.4 × 1.10 = 0 円</div>
              </div>

              <div class="result-box">
                <div class="result-main result-main-primary">
                  <strong id="grand_total_label">売価</strong>
                  <span id="grand_total">0円</span>
                </div>
                <div class="result-breakdown">
                  <div class="result-table">
                    <div class="result-row result-head">
                      <div class="result-cell">数量(kg)</div>
                      <div class="result-cell">売単価</div>
                      <div class="result-cell">税抜売価</div>
                    </div>
                    <div class="result-row">
                      <div class="result-cell result-value" id="grand_qty">0.0</div>
                      <div class="result-cell result-value" id="grand_unit">154.4</div>
                      <div class="result-cell result-value" id="grand_amount">0円</div>
                    </div>
                    <div class="result-row">
                      <div class="result-cell"></div>
                      <div class="result-cell">消費税</div>
                      <div class="result-cell result-value" id="grand_tax">0円</div>
                    </div>
                    <div class="result-row result-total">
                      <div class="result-cell"></div>
                      <div class="result-cell">合計売価</div>
                      <div class="result-cell result-value" id="grand_sum">0円</div>
                    </div>
                    <div class="result-row-spacer" aria-hidden="true"></div>
                    <div class="result-row result-head">
                      <div class="result-cell">数量(kg)</div>
                      <div class="result-cell">買単価</div>
                      <div class="result-cell">買価</div>
                    </div>
                    <div class="result-row">
                      <div class="result-cell result-value" id="grand_qty_cost">0.0</div>
                      <div class="result-cell result-value" id="grand_base_unit">143.4</div>
                      <div class="result-cell result-value" id="grand_base_amount">0円</div>
                    </div>
                    <div class="result-row">
                      <div class="result-cell"></div>
                      <div class="result-cell">消費税</div>
                      <div class="result-cell result-value" id="grand_base_tax">0円</div>
                    </div>
                    <div class="result-row result-total">
                      <div class="result-cell"></div>
                      <div class="result-cell">合計買価</div>
                      <div class="result-cell result-value" id="grand_base_sum">0円</div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </article>
    </main>
  </div>

<script>
const MAX_TILES = 20;
const INITIAL_SETTINGS = {
  basePrice: '143.4',
  margin: '11',
  conversion: '0.48',
  tax: '1.1',
};
let tileCount = 0;

function truncateDecimals(value, digits) {
  const factor = 10 ** digits;
  return Math.trunc(Number(value) * factor) / factor;
}

function formatNumber(value, digits) {
  return Number(value).toLocaleString('ja-JP', {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits,
  });
}

function formatTruncated(value, digits) {
  return formatNumber(truncateDecimals(value, digits), digits);
}

function formatYen(value) {
  return `${Math.round(value).toLocaleString('ja-JP')} 円`;
}

function getSettings() {
  const basePrice = parseFloat(document.getElementById('cfg_base_price').value) || 0;
  const margin = parseFloat(document.getElementById('cfg_tax_amount').value) || 0;
  return {
    basePrice,
    margin,
    sellUnitPrice: basePrice + margin,
    conversion: parseFloat(document.getElementById('cfg_conversion').value) || 1,
    tax: parseFloat(document.getElementById('cfg_tax').value) || 1,
  };
}

function updateStickyTop() {
  const header = document.querySelector('.app-header');
  if (!header) return;
  document.documentElement.style.setProperty('--sticky-top', `${header.offsetHeight + 8}px`);
}

function updateAdjustedPriceDisplay() {
  const basePrice = parseFloat(document.getElementById('cfg_base_price').value) || 0;
  const margin = parseFloat(document.getElementById('cfg_tax_amount').value) || 0;
  const adjusted = basePrice + margin;
  document.getElementById('cfg_adjusted_price_display').textContent =
    `${formatNumber(adjusted, 1)}円`;
}

function getSummaryLabel() {
  const titles = [];

  for (let i = 1; i <= tileCount; i += 1) {
    const input = document.getElementById(`memo_${i}`);
    const title = input?.value.trim();
    if (title) titles.push(title);
  }

  return titles.length ? `${titles.join('/')} 売価` : '売価';
}

function getTileUsage(id) {
  const cur = document.getElementById(`cur_m3_${id}`);
  const prev = document.getElementById(`prev_m3_${id}`);
  const current = parseFloat(cur?.value) || 0;
  const previous = parseFloat(prev?.value) || 0;
  const usageM3 = truncateDecimals(current - previous, 1);
  return usageM3;
}

function updateTileUsage(id) {
  const cfg = getSettings();
  const memoValue = document.getElementById(`memo_${id}`)?.value.trim() || '';
  const curValue = parseFloat(document.getElementById(`cur_m3_${id}`)?.value) || 0;
  const prevValue = parseFloat(document.getElementById(`prev_m3_${id}`)?.value) || 0;
  const curKg = cfg.conversion === 0 ? 0 : truncateDecimals(curValue / cfg.conversion, 1);
  const prevKg = cfg.conversion === 0 ? 0 : truncateDecimals(prevValue / cfg.conversion, 1);
  const usageM3 = getTileUsage(id);
  const usageKgRaw = cfg.conversion === 0 ? 0 : usageM3 / cfg.conversion;
  const usageKg = cfg.conversion === 0 ? 0 : truncateDecimals(usageKgRaw, 1);
  const buyAmount = Math.floor(usageKg * cfg.basePrice);
  const sellPreTax = Math.round(usageKgRaw * cfg.sellUnitPrice);
  const sellAmount = Math.round(sellPreTax * cfg.tax);
  const conversionText = formatNumber(truncateDecimals(cfg.conversion, 2), 2);

  document.getElementById(`cur_kg_hint_${id}`).textContent = `${formatTruncated(curKg, 1)} kg`;
  document.getElementById(`prev_kg_hint_${id}`).textContent = `${formatTruncated(prevKg, 1)} kg`;
  document.getElementById(`usage_title_${id}`).textContent = memoValue || '使用量・売価';
  document.getElementById(`usage_line1_${id}`).textContent =
    '';
  document.getElementById(`usage_line1_${id}`).innerHTML =
    `<span class="usage-label">使用量</span><span class="usage-line-strong">${formatTruncated(usageKg, 1)}kg</span> <span class="inline-strong">(${formatTruncated(usageM3, 1)}㎥)</span>`;
  document.getElementById(`usage_line2_${id}`).textContent =
    '';
  document.getElementById(`usage_line2_${id}`).innerHTML =
    `<span class="usage-label">売価</span><span class="usage-line-strong">${sellAmount.toLocaleString('ja-JP')}円</span> <span class="inline-strong">(${formatTruncated(usageM3, 1)} ÷ ${conversionText} × ${formatNumber(cfg.sellUnitPrice, 1)} × ${formatNumber(cfg.tax, 2)})</span>`;
  document.getElementById(`usage_line3_${id}`).textContent =
    '';
  document.getElementById(`usage_line3_${id}`).innerHTML =
    `<span class="usage-label">買価</span><span class="usage-line-strong usage-line-cost">${buyAmount.toLocaleString('ja-JP')}円</span>`;
}

function syncAllTiles() {
  for (let i = 1; i <= tileCount; i += 1) {
    if (!document.getElementById(`tile_${i}`)) continue;
    updateTileUsage(i);
  }
}

function recalcTotal() {
  const cfg = getSettings();
  let totalUsageM3 = 0;
  const usageParts = [];

  for (let i = 1; i <= tileCount; i += 1) {
    if (!document.getElementById(`tile_${i}`)) continue;
    const usage = getTileUsage(i);
    totalUsageM3 += usage;
    usageParts.push(formatTruncated(usage, 1));
  }

  totalUsageM3 = truncateDecimals(totalUsageM3, 1);
  const totalUsageKgRaw = cfg.conversion === 0 ? 0 : totalUsageM3 / cfg.conversion;
  const totalUsageKg = cfg.conversion === 0 ? 0 : truncateDecimals(totalUsageKgRaw, 1);
  const baseAmount = Math.floor(totalUsageKg * cfg.basePrice);
  const baseTaxValue = Math.floor(baseAmount * (cfg.tax - 1));
  const baseSummaryAmount = baseAmount + baseTaxValue;
  const lineAmount = Math.round(totalUsageKgRaw * cfg.sellUnitPrice);
  const taxValue = Math.round(lineAmount * (cfg.tax - 1));
  const summaryAmount = lineAmount + taxValue;
  const conversionText = formatNumber(truncateDecimals(cfg.conversion, 2), 2);
  const joinedUsage = usageParts.length ? usageParts.map((part) => `${part}㎥`).join(' + ') : '0.0㎥';

  document.getElementById('total_usage_m3').innerHTML =
    `${joinedUsage} = <span class="formula-strong">${formatTruncated(totalUsageM3, 1)}㎥</span> ÷ ${conversionText} = <span class="formula-strong">${formatTruncated(totalUsageKg, 1)}kg</span>`;
  document.getElementById('total_formula').innerHTML =
    `${formatTruncated(totalUsageM3, 1)} ÷ ${conversionText} × <span class="inline-strong">${formatNumber(cfg.sellUnitPrice, 1)}</span> × ${formatNumber(cfg.tax, 2)} = <span class="formula-strong">${summaryAmount.toLocaleString('ja-JP')}円</span>`;
  document.getElementById('grand_total_label').textContent = getSummaryLabel();
  document.getElementById('grand_total').textContent = formatYen(summaryAmount);
  document.getElementById('grand_qty').textContent = `${formatTruncated(totalUsageKg, 1)}`;
  document.getElementById('grand_qty_cost').textContent = `${formatTruncated(totalUsageKg, 1)}`;
  document.getElementById('grand_base_unit').textContent = `${formatNumber(cfg.basePrice, 1)}`;
  document.getElementById('grand_base_amount').textContent = `${baseAmount.toLocaleString('ja-JP')}円`;
  document.getElementById('grand_base_tax').textContent = `${baseTaxValue.toLocaleString('ja-JP')}円`;
  document.getElementById('grand_base_sum').textContent = `${baseSummaryAmount.toLocaleString('ja-JP')}円`;
  document.getElementById('grand_unit').textContent = `${formatNumber(cfg.sellUnitPrice, 1)}`;
  document.getElementById('grand_amount').textContent = `${lineAmount.toLocaleString('ja-JP')}円`;
  document.getElementById('grand_tax').textContent = `${taxValue.toLocaleString('ja-JP')}円`;
  document.getElementById('grand_sum').textContent = `${summaryAmount.toLocaleString('ja-JP')}円`;
  document.getElementById('head_total_usage').textContent = `${formatTruncated(totalUsageKg, 1)}kg`;
  document.getElementById('head_total_cost').textContent = `${baseSummaryAmount.toLocaleString('ja-JP')}円`;
  document.getElementById('head_total_amount').textContent = `${summaryAmount.toLocaleString('ja-JP')}円`;
  updateStickyTop();
}

function bindEnterNavigation(root) {
  root.querySelectorAll('input[data-next]').forEach((input) => {
    input.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      const next = document.querySelector(event.currentTarget.dataset.next);
      if (next) {
        next.focus();
        next.select?.();
      }
    });
  });
}

function resetApp() {
  document.getElementById('cfg_base_price').value = INITIAL_SETTINGS.basePrice;
  document.getElementById('cfg_tax_amount').value = INITIAL_SETTINGS.margin;
  document.getElementById('cfg_conversion').value = INITIAL_SETTINGS.conversion;
  document.getElementById('cfg_tax').value = INITIAL_SETTINGS.tax;
  document.getElementById('tiles').innerHTML = '';
  tileCount = 0;
  updateAdjustedPriceDisplay();
  addTile();
}

function addTile() {
  if (tileCount >= MAX_TILES) return;
  tileCount += 1;
  const id = tileCount;
  const colorIndex = ((id - 1) % 3) + 1;
  const tiles = document.getElementById('tiles');
  const tile = document.createElement('section');
  tile.className = 'input-tile';
  tile.id = `tile_${id}`;
  tile.style.setProperty('--tile-bg', `var(--tile-${colorIndex}-bg)`);
  tile.style.setProperty('--tile-line', `var(--tile-${colorIndex}-line)`);
  tile.innerHTML = `
    <div class="tile-head">
      <div class="tile-no">${String(id).padStart(2, '0')}</div>
      <input type="text" id="memo_${id}" placeholder="任意">
    </div>

    <div class="tile-body">
      <div class="reading-field">
        <div class="reading-grid">
          <div class="reading-input">
            <label class="field-title" for="cur_m3_${id}">今回指針</label>
            <div class="reading-input-row">
              <input type="number" id="cur_m3_${id}" step="0.1" placeholder="0" data-next="#prev_m3_${id}" inputmode="decimal" enterkeyhint="next">
              <div class="reading-unit">㎥</div>
            </div>
            <div class="reading-sub" id="cur_kg_hint_${id}">0.0 kg</div>
          </div>
          <div class="reading-arrow">◀</div>
          <div class="reading-input">
            <label class="field-title" for="prev_m3_${id}">前回指針</label>
            <div class="reading-input-row">
              <input type="number" id="prev_m3_${id}" step="0.1" placeholder="0" data-next="#add-tile-btn" inputmode="decimal" enterkeyhint="next">
              <div class="reading-unit">㎥</div>
            </div>
            <div class="reading-sub" id="prev_kg_hint_${id}">0.0 kg</div>
          </div>
        </div>
      </div>

      <div class="usage-field">
        <label class="field-title" id="usage_title_${id}">使用量・売価</label>
        <div class="usage-grid">
          <div class="usage-line" id="usage_line1_${id}">使用量 0.0kg (0.0㎥)</div>
          <div class="usage-line" id="usage_line2_${id}">売価 0円 (0.0 ÷ 0.48 × 154.4 × 1.10)</div>
          <div class="usage-line usage-line-cost" id="usage_line3_${id}">買価 0円</div>
        </div>
      </div>
    </div>
  `;

  tiles.appendChild(tile);
  bindEnterNavigation(tile);
  tile.querySelector(`#memo_${id}`).addEventListener('input', () => {
    updateTileUsage(id);
    recalcTotal();
  });
  tile.querySelector(`#cur_m3_${id}`).addEventListener('input', () => {
    updateTileUsage(id);
    recalcTotal();
  });
  tile.querySelector(`#prev_m3_${id}`).addEventListener('input', () => {
    updateTileUsage(id);
    recalcTotal();
  });
  updateTileUsage(id);
  recalcTotal();
  document.getElementById('add-tile-btn').disabled = tileCount >= MAX_TILES;
  tile.querySelector(`#cur_m3_${id}`).focus();
}

document.getElementById('add-tile-btn').addEventListener('click', addTile);
document.getElementById('reset-btn').addEventListener('click', resetApp);
document.querySelectorAll('.settings input').forEach((input) => {
  input.addEventListener('input', () => {
    updateAdjustedPriceDisplay();
    syncAllTiles();
    recalcTotal();
  });
});
window.addEventListener('resize', updateStickyTop);

updateAdjustedPriceDisplay();
addTile();
</script>
</body>
</html>
